<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: black;
    font-family: sans-serif;
  }

  .container {
    max-width: 500px;
    margin: auto;
  }

  .menu-wrapper {
    position: relative;
    overflow: hidden;
    margin-bottom: 12px;
    border-radius: 12px; /* biar lebih clean */
  }

  /* BACKGROUND BLUR */
  .menu-wrapper::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: var(--bg);
    background-size: cover;
    background-position: center;
    filter: blur(25px);
    transform: scale(1.2);
    z-index: 1;
    opacity: 0.7; /* biar ga terlalu terang */
  }

  img {
    position: relative;
    z-index: 2;
    width: 100%;
    height: auto;
    display: block;
  }

  html {
    scroll-behavior: smooth;
  }
</style>
</head>

<body>

<div class="container">

  <div class="menu-wrapper" style="--bg: url('https://raw.githubusercontent.com/malwisihab/qr-foto/main/Menu1.jpeg')">
    <img src="https://raw.githubusercontent.com/malwisihab/qr-foto/main/Menu1.jpeg">
  </div>

  <div class="menu-wrapper" style="--bg: url('https://raw.githubusercontent.com/malwisihab/qr-foto/main/menu3.jpeg')">
    <img src="https://raw.githubusercontent.com/malwisihab/qr-foto/main/menu3.jpeg">
  </div>

</div>

</body>
</html>
